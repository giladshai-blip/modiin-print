<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>דפוס מודיעין - מעקב הזמנות</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,sans-serif;background:#f6f8fb;color:#202124}.box{text-align:center;padding:28px}.spinner{width:42px;height:42px;border:4px solid #d7e3ff;border-top-color:#1a73e8;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 14px}@keyframes s{to{transform:rotate(360deg)}}.err{max-width:560px;line-height:1.6}</style></head><body><div class="box"><div class="spinner"></div><b>טוען את דפוס מודיעין...</b></div><script>
(async()=>{try{if(!('DecompressionStream'in window))throw new Error('הדפדפן לא תומך בטעינת הגרסה המלאה. נסה Chrome או Edge עדכני.');const v='1780052967955';const files=[0,1,2,3,4,5,6,7].map(i=>'modiin-print-sync.data.'+i+'.txt?v='+v);const data=(await Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('טעינת קובץ נתונים נכשלה');return r.text()})))).join('').trim();const bin=Uint8Array.from(atob(data),c=>c.charCodeAt(0));const stream=new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'));let html=await new Response(stream).text();html=html.replace("body { font-family: 'Rubik', sans-serif; background: linear-gradient(135deg,#f5f8ff 0%,#f9fbf7 42%,#fff7ed 100%); color: var(--text); min-height: 100vh; display: flex; overflow: hidden; }","html { min-height: 100%; overflow-x: hidden; }\n  body { font-family: 'Rubik', sans-serif; background: linear-gradient(135deg,#f5f8ff 0%,#f9fbf7 42%,#fff7ed 100%); color: var(--text); min-height: 100vh; display: flex; overflow-x: hidden; overflow-y: auto; }");html=html.replace("#sidebar { width: var(--sidebar-w); background: rgba(255,255,255,.94); border-left: 1px solid var(--border); box-shadow: -2px 0 18px rgba(60,64,67,.08); display: flex; flex-direction: column; padding: 20px 12px; gap: 4px; flex-shrink: 0; transition: transform .25s; }","#sidebar { width: var(--sidebar-w); height: 100vh; position: sticky; top: 0; overflow-y: auto; overscroll-behavior: contain; background: rgba(255,255,255,.94); border-left: 1px solid var(--border); box-shadow: -2px 0 18px rgba(60,64,67,.08); display: flex; flex-direction: column; padding: 20px 12px; gap: 4px; flex-shrink: 0; transition: transform .25s; }");html=html.replace("#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }","#main { flex: 1; min-height: 100vh; display: flex; flex-direction: column; overflow: visible; min-width: 0; }");html=html.replace("#content { flex: 1; overflow-y: auto; padding: 28px; }","#content { flex: 1; overflow: visible; padding: 28px; }");html=html.replace("@media (max-width: 768px) {\n    #sidebar { position: fixed; right: 0; top: 0; bottom: 0; z-index: 40; transform: translateX(110%); box-shadow: -4px 0 24px rgba(0,0,0,.14); }","@media (max-width: 768px) {\n    body { display: block; min-height: 100dvh; }\n    #main { min-height: 100dvh; }\n    #sidebar { position: fixed; right: 0; top: 0; bottom: 0; height: 100dvh; z-index: 40; transform: translateX(110%); box-shadow: -4px 0 24px rgba(0,0,0,.14); }");document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<div class="box err"><h2>שגיאה בטעינת האפליקציה</h2><p>'+String(e.message||e)+'</p></div>'}})();
</script></body></html>
