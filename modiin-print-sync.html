<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>דפוס מודיעין — מעקב הזמנות</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a73e8;
    --blue-lt: #e8f0fe;
    --red: #ea4335;
    --yellow: #fbbc04;
    --yellow-lt: #fef7e0;
    --green: #34a853;
    --green-lt: #e6f4ea;
    --surface: #fff;
    --bg: #f8f9fa;
    --border: #e8eaed;
    --text: #202124;
    --text-2: #5f6368;
    --text-3: #9aa0a6;
    --radius: 16px;
    --sidebar-w: 260px;
    --shadow: 0 1px 3px rgba(60,64,67,.12), 0 1px 2px rgba(60,64,67,.08);
    --shadow-lg: 0 4px 12px rgba(60,64,67,.15);
  }
  body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w); background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px 12px; gap: 4px; flex-shrink: 0;
    transition: transform .25s;
  }
  .logo { display: flex; align-items: center; gap: 12px; padding: 12px 16px 24px; }
  .logo-icon { width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
  .logo-text h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .logo-text p { font-size: 11px; color: var(--text-3); }
  .nav-item {
    display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 100px;
    cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-2); border: none;
    background: none; width: 100%; text-align: right; transition: background .15s, color .15s;
  }
  .nav-item:hover { background: var(--bg); }
  .nav-item.active { background: var(--blue-lt); color: var(--blue); font-weight: 600; }
  .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--blue-lt); color: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .avatar-info p:first-child { font-size: 13px; font-weight: 600; }
  .avatar-info p:last-child { font-size: 11px; color: var(--text-3); }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  header {
    height: 64px; background: rgba(255,255,255,.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); display: flex; align-items: center;
    justify-content: space-between; padding: 0 28px; gap: 16px; flex-shrink: 0; position: sticky; top: 0; z-index: 10;
  }
  .search-wrap { position: relative; flex: 1; max-width: 400px; }
  .search-wrap input {
    width: 100%; background: var(--bg); border: none; border-radius: 100px; padding: 10px 42px 10px 16px;
    font-size: 13px; font-family: inherit; outline: none; color: var(--text); transition: box-shadow .2s;
  }
  .search-wrap input:focus { box-shadow: 0 0 0 2px var(--blue); }
  .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
  .btn-upload {
    display: flex; align-items: center; gap: 8px; padding: 10px 22px; background: var(--blue);
    color: #fff; border-radius: 100px; font-size: 13px; font-weight: 600; font-family: inherit;
    border: none; cursor: pointer; box-shadow: 0 2px 6px rgba(26,115,232,.35); transition: background .15s, transform .1s;
  }
  .btn-upload:hover { background: #1557b0; }
  .btn-upload:active { transform: scale(.97); }
  .btn-upload:disabled { opacity: .6; cursor: not-allowed; }

  /* ── Content ── */
  #content { flex: 1; overflow-y: auto; padding: 28px; }

  /* ── Dashboard ── */
  .gauges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 28px; }
  .gauge-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; display: flex; flex-direction: column; align-items: center; box-shadow: var(--shadow);
    transition: box-shadow .2s;
  }
  .gauge-card:hover { box-shadow: var(--shadow-lg); }
  .gauge-svg { width: 110px; height: 60px; }
  .gauge-val { font-size: 28px; font-weight: 700; margin-top: -4px; }
  .gauge-label { font-size: 11px; color: var(--text-2); margin-top: 4px; font-weight: 500; }
  .revenue-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .revenue-card .label { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .revenue-card .amount { font-size: 30px; font-weight: 800; margin-top: 6px; color: var(--text); }
  .revenue-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--blue-lt); color: var(--blue); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin-top: 10px; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .chart-card h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .chart-area { height: 220px; display: flex; align-items: flex-end; gap: 10px; padding-top: 16px; overflow: hidden; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 0; }
  .bar-fill { width: 100%; border-radius: 6px 6px 0 0; background: var(--blue); transition: height .4s cubic-bezier(.4,0,.2,1); }
  .bar-label { font-size: 10px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .line-svg { width: 100%; height: 220px; }

  /* ── Table ── */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead tr { background: var(--bg); }
  thead th { padding: 14px 20px; font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); text-align: right; }
  tbody tr { cursor: pointer; transition: background .12s; border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f4fd; }
  tbody tr.expanded { background: #f0f4fd; }
  td { padding: 16px 20px; font-size: 13px; vertical-align: middle; }
  .order-num { color: var(--blue); font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 100px;
    font-size: 10px; font-weight: 700; text-transform: uppercase;
  }
  .badge-blue { background: var(--blue-lt); color: var(--blue); }
  .badge-yellow { background: var(--yellow-lt); color: #c77b00; }
  .badge-green { background: var(--green-lt); color: #1e7e34; }
  .badge-gray { background: var(--bg); color: var(--text-3); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-blue .badge-dot { background: var(--blue); }
  .badge-yellow .badge-dot { background: var(--yellow); }
  .badge-green .badge-dot { background: var(--green); }
  .badge-gray .badge-dot { background: var(--text-3); }
  .total-cell { font-weight: 700; color: var(--text); }
  .del-btn { background: none; border: none; color: var(--border); cursor: pointer; padding: 6px; border-radius: 8px; transition: color .15s, background .15s; opacity: 0; }
  tbody tr:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); background: #fce8e6; }
  .expanded-row td { padding: 0; }
  .expanded-inner { padding: 12px 24px 20px; }
  .sub-table-wrap { background: var(--bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .sub-table { width: 100%; border-collapse: collapse; }
  .sub-table th { padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; background: var(--bg); border-bottom: 1px solid var(--border); text-align: right; }
  .sub-table td { padding: 12px 16px; font-size: 12px; border-bottom: 1px solid var(--border); text-align: right; }
  .sub-table tr:last-child td { border-bottom: none; }
  .sub-table td.sub-total { color: var(--blue); font-weight: 700; }
  .status-select {
    border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 600;
    font-family: inherit; background: var(--surface); color: var(--text); cursor: pointer; outline: none; transition: border .15s;
  }
  .status-select:focus { border-color: var(--blue); }
  .table-overflow { overflow-x: auto; }

  /* ── Modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(32,33,36,.5); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fadeIn .15s;
  }
  .modal {
    background: var(--surface); border-radius: 24px; width: 100%; max-width: 700px;
    box-shadow: 0 20px 40px rgba(0,0,0,.18); padding: 32px; animation: zoomIn .2s cubic-bezier(.4,0,.2,1);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-header h2 { font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-2); padding: 6px; border-radius: 8px; transition: background .15s; }
  .modal-close:hover { background: var(--bg); }
  .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; background: var(--bg); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .meta-item label { font-size: 10px; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
  .meta-item span { font-size: 15px; font-weight: 700; }
  .items-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .item-row span { font-size: 13px; font-weight: 500; }
  .item-meta { display: flex; align-items: center; gap: 20px; }
  .item-meta small { font-size: 11px; color: var(--text-3); }
  .item-meta strong { color: var(--blue); font-weight: 700; font-size: 14px; }
  .modal-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid var(--border); padding-top: 20px; }
  .modal-total label { font-size: 11px; color: var(--text-3); font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .modal-total span { font-size: 28px; font-weight: 800; }
  .btn-save { padding: 14px 36px; background: var(--blue); color: #fff; border-radius: 100px; font-size: 14px; font-weight: 700; font-family: inherit; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(26,115,232,.4); transition: background .15s, transform .1s; }
  .btn-save:hover { background: #1557b0; }
  .btn-save:active { transform: scale(.97); }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #202124; color: #fff; padding: 12px 28px; border-radius: 100px;
    font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-lg); z-index: 100; animation: slideDown .3s cubic-bezier(.4,0,.2,1);
  }
  .toast.hiding { animation: slideUp .3s forwards; }
  .toast-icon { color: var(--green); }

  /* ── Spinner ── */
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }

  /* ── Empty state ── */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--text-3); gap: 12px; }
  .empty svg { opacity: .35; }
  .empty p { font-size: 14px; font-weight: 500; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes zoomIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes slideUp { to { opacity: 0; transform: translateX(-50%) translateY(-12px); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    #sidebar { position: fixed; right: 0; top: 0; bottom: 0; z-index: 40; transform: translateX(110%); }
    #sidebar.open { transform: translateX(0); }
    .charts-grid { grid-template-columns: 1fr; }
    .gauges-grid { grid-template-columns: repeat(2, 1fr); }
    .meta-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-icon">🖨</div>
    <div class="logo-text">
      <h1>דפוס מודיעין</h1>
      <p>מעקב הזמנות</p>
    </div>
  </div>

  <button class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    דשבורד
  </button>
  <button class="nav-item" data-tab="records" onclick="switchTab('records')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.657 4.03 3 9 3s9-1.343 9-3V5"/><path d="M3 12c0 1.657 4.03 3 9 3s9-1.343 9-3"/></svg>
    ניהול הזמנות
  </button>

  <div class="nav-divider"></div>

  <button class="nav-item" onclick="exportCSV()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#34a853" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 17 15 14"/></svg>
    ייצוא CSV
  </button>

  <div class="nav-divider"></div>
  <div class="sidebar-footer">
    <div class="avatar">צ</div>
    <div class="avatar-info">
      <p>צחי שרביט</p>
      <p>מנהל מערכת</p>
    </div>
  </div>
</aside>

<!-- Main -->
<div id="main">
  <header>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="חיפוש לקוח או מספר הזמנה..." oninput="renderTable()" />
    </div>
    <label class="btn-upload" id="uploadLabel">
      <svg id="uploadIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <span id="uploadText">סרוק מסמך</span>
      <input type="file" id="fileInput" accept="application/pdf,image/jpeg,image/png,image/webp" style="display:none" onchange="handleFile(event)" />
    </label>
  </header>

  <div id="content">
    <!-- dashboard -->
    <div id="tab-dashboard">
      <div class="gauges-grid" id="gaugesGrid"></div>
      <div class="charts-grid">
        <div class="chart-card">
          <h4>פעילות לפי ספקים (₪)</h4>
          <div class="chart-area" id="vendorChart"></div>
        </div>
        <div class="chart-card">
          <h4>מגמת הכנסות (₪)</h4>
          <svg class="line-svg" id="lineChart" viewBox="0 0 600 220" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </div>

    <!-- records -->
    <div id="tab-records" style="display:none">
      <div class="table-card">
        <div class="table-overflow">
          <table>
            <thead>
              <tr>
                <th>מס' הזמנה</th>
                <th>לקוח</th>
                <th>תאריך</th>
                <th>סטטוס</th>
                <th style="text-align:left">סה"כ</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="empty" id="emptyState" style="display:none">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>אין הזמנות עדיין — סרוק מסמך כדי להתחיל</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Pending Modal -->
<div class="modal-bg" id="modal" style="display:none" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>אישור נתוני סריקה</h2>
      <button class="modal-close" onclick="closePendingModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="meta-grid" id="modalMeta"></div>
    <div class="items-list" id="modalItems"></div>
    <div class="modal-footer">
      <div class="modal-total">
        <label>סה"כ לתשלום</label>
        <span id="modalTotal"></span>
      </div>
      <button class="btn-save" onclick="saveOrder()">אישור ושמירה</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none">
  <svg class="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<script type="module">
// ── Expose functions to global scope for inline handlers ──
window.$ = id => document.getElementById(id);
window.switchTab = switchTab;
window.handleFile = handleFile;
window.exportCSV = exportCSV;
window.saveOrder = saveOrder;
window.closePendingModal = closePendingModal;
window.closeModalBg = closeModalBg;
window.toggleRow = toggleRow;
window.deleteOrder = deleteOrder;
window.updateItemStatus = updateItemStatus;
window.renderTable = renderTable;
window.forceUpload = forceUpload;
// ── Config — Fill these before use ──
const GEMINI_API_KEY = "AIzaSyAHhNGhAynvDl_WhjB6_BMZSini96_bMlw";
const FIREBASE_CONFIG = null; // 📦 או null לשימוש ב-localStorage

// ── State ──
let records = JSON.parse(localStorage.getItem('modiin_orders') || '[]');
let pendingData = null;
let expandedId = null;
const STATUS = ['בעבודה','טופל חלקית','הושלם','מבוטל'];

// ── Utils ──
const fmt = n => Number(n || 0).toLocaleString('he-IL');
const save = () => localStorage.setItem('modiin_orders', JSON.stringify(records));
const uid  = () => Math.random().toString(36).slice(2,10);
const $ = id => document.getElementById(id);

function showToast(msg) {
  const t = $('toast'); $('toastMsg').textContent = msg;
  t.style.display = 'flex'; t.classList.remove('hiding');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.classList.add('hiding'); setTimeout(() => t.style.display='none', 300); }, 3000);
}

function badgeClass(s) {
  return s === 'בעבודה' ? 'badge-blue' : s === 'טופל חלקית' ? 'badge-yellow' : s === 'הושלם' ? 'badge-green' : 'badge-gray';
}

// ── Tab ──
function switchTab(tab) {
  ['dashboard','records'].forEach(t => {
    $('tab-' + t).style.display = t === tab ? 'block' : 'none';
    document.querySelector(`[data-tab="${t}"]`)?.classList.toggle('active', t === tab);
  });
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'records') renderTable();
}

// ── File Upload & AI ──
async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const allowed = ['application/pdf','image/jpeg','image/png','image/webp','image/gif'];
  if (!allowed.includes(file.type)) {
    showToast('⚠ סוג קובץ לא נתמך — השתמש ב-PDF, JPG, PNG');
    return;
  }

  setScanning(true);
  try {
    const b64data = await readAsBase64raw(file);
    const data = await analyzeDocument(b64data, file.type);
    data.sourceFile = file.name;

    // בדיקת כפילות לפי מספר הזמנה — אחרי הסריקה
    const duplicate = records.find(r => r.orderNumber && r.orderNumber === data.orderNumber);
    if (duplicate) {
      showDuplicateWarning(data.orderNumber, duplicate);
      return;
    }

    pendingData = data;
    openPendingModal(data);
  } catch(err) {
    showToast('⚠ שגיאה: ' + err.message);
  } finally {
    setScanning(false);
  }
}

function showDuplicateWarning(orderNumber, existing) {
  const old = $('dupWarning');
  if (old) old.remove();

  const div = document.createElement('div');
  div.id = 'dupWarning';
  div.style.cssText = `
    position:fixed; top:80px; left:50%; transform:translateX(-50%);
    background:#fff; border:1px solid #fbbc04; border-radius:16px;
    padding:20px 24px; box-shadow:0 8px 24px rgba(0,0,0,.15);
    z-index:200; min-width:340px; direction:rtl;
    animation: slideDown .25s cubic-bezier(.4,0,.2,1);
  `;
  div.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:20px">⚠️</span>
      <b style="font-size:14px;color:#202124">הזמנה זו כבר קיימת במערכת</b>
    </div>
    <p style="font-size:12px;color:#5f6368;margin-bottom:4px">מספר הזמנה: <b>#${orderNumber}</b></p>
    <p style="font-size:12px;color:#5f6368;margin-bottom:16px">לקוח: <b>${existing.client||'—'}</b> | תאריך: <b>${existing.date||'—'}</b></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="$('dupWarning').remove(); pendingData=null;" style="padding:8px 18px;border:1px solid #e8eaed;border-radius:100px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">ביטול</button>
      <button onclick="forceUpload()" style="padding:8px 18px;background:#ea4335;color:#fff;border:none;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">הוסף בכל זאת</button>
    </div>
  `;
  document.body.appendChild(div);
}

function forceUpload() {
  $('dupWarning')?.remove();
  // pendingData כבר מוכן — פותחים את המודל ישירות
  if (pendingData) openPendingModal(pendingData);
}

function setScanning(on) {
  const inp = document.querySelector('#uploadLabel input');
  if (inp) inp.disabled = on;
  const txt = $('uploadText');
  if (txt) txt.textContent = on ? 'סורק...' : 'סרוק מסמך';
  const icon = $('uploadIcon');
  if (!icon) return;
  if (on) {
    icon.outerHTML = '<span id="uploadIcon" class="spinner"></span>';
  } else {
    icon.outerHTML = '<svg id="uploadIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>';
  }
}

// מחזיר base64 נקי (ללא prefix data:...)
function readAsBase64raw(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('קריאת קובץ נכשלה'));
    r.readAsDataURL(file);
  });
}

async function analyzeDocument(b64data, mimeType) {
  // ── Demoללא מפתח ──
  if (!GEMINI_API_KEY) {
    return {
      vendor: 'דפוס מודיעין',
      orderNumber: '517191',
      client: 'בית כנסת צעירי הכרמים',
      date: '2026-01-01',
      items: [
        { description: '6 פנקסי קבלה 25/3 A5',              quantity: 1, unitPrice: 170, total: 170 },
        { description: '500 מעטפות 10/15 ס"מ מודפס בפרוצס', quantity: 1, unitPrice: 350, total: 350 },
        { description: 'שלט PVC 20/30 ס"מ',                  quantity: 1, unitPrice: 25,  total: 25  }
      ]
    };
  }

  // ── Gemini — PDF ותמונות נשלחים כ-inlineData ישירות ──
  const prompt =
`אתה מנתח מסמכי הזמנות והצעות מחיר בעברית.
חלץ את המידע מהמסמך המצורף והחזר JSON בלבד, ללא markdown:
{"vendor":"שם הספק","orderNumber":"מספר הזמנה","client":"שם הלקוח","date":"YYYY-MM-DD","items":[{"description":"תיאור פריט","quantity":1,"unitPrice":100,"total":100}]}
חשוב: כלול רק שורות פריטים (מוצרים/שירותים) — לא שורות סיכום כמו מע"מ, הנחה, סה"כ.`;

  const body = {
    contents: [{
      parts: [
        { text: prompt },
        { inlineData: { mimeType, data: b64data } }
      ]
    }],
    generationConfig: { temperature: 0.05, maxOutputTokens: 2048 }
  };

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );

  if (!res.ok) {
    const errJson = await res.json().catch(() => ({}));
    throw new Error(errJson?.error?.message || `שגיאת API ${res.status}`);
  }

  const result = await res.json();
  const raw = result.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // נקה גרשיים markdown אם יש
  const clean = raw.replace(/```json|```/g, '').trim();
  const m = clean.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('תשובת ה-AI לא הכילה JSON תקין:\n' + raw.slice(0,200));

  const parsed = JSON.parse(m[0]);
  parsed.items = (parsed.items || []).map(it => ({ ...it, status: 'בעבודה' }));
  return parsed;
}

// ── Pending Modal ──
function openPendingModal(d) {
  $('modalMeta').innerHTML = `
    <div class="meta-item"><label>לקוח</label><span>${d.client||'-'}</span></div>
    <div class="meta-item"><label>הזמנה</label><span>#${d.orderNumber||'-'}</span></div>
    <div class="meta-item"><label>תאריך</label><span>${d.date||'-'}</span></div>`;
  $('modalItems').innerHTML = (d.items||[]).map(it => `
    <div class="item-row">
      <span>${it.description}</span>
      <div class="item-meta">
        <small>כמות: ${it.quantity}</small>
        <strong>₪${fmt(it.total)}</strong>
      </div>
    </div>`).join('');
  const total = (d.items||[]).reduce((s,i)=>s+Number(i.total||0),0);
  $('modalTotal').textContent = '₪' + fmt(total);
  $('modal').style.display = 'flex';
}

function closePendingModal() { $('modal').style.display='none'; pendingData=null; }
function closeModalBg(e) { if(e.target===$('modal')) closePendingModal(); }

async function saveOrder() {
  if (!pendingData) return;
  const total = (pendingData.items||[]).reduce((s,i)=>s+Number(i.total||0),0);
  const order = {
    ...pendingData,
    id: uid(),
    totalAmount: total,
    status: 'בעבודה',
    createdAt: new Date().toISOString(),
    sourceFile: pendingData.sourceFile || ''
  };
  order.items = order.items.map(it=>({...it, status: 'בעבודה'}));
  records.unshift(order);
  save();
  closePendingModal();
  showToast('הזמנה נפתחה בסטטוס "בעבודה"');
  switchTab('records');
}

// ── Table ──
function renderTable() {
  const q = $('searchInput').value.toLowerCase();
  const filtered = records.filter(r =>
    (r.client||'').toLowerCase().includes(q) ||
    String(r.orderNumber||'').includes(q)
  );
  const tbody = $('tableBody');
  $('emptyState').style.display = filtered.length ? 'none' : 'flex';
  tbody.innerHTML = filtered.map(order => `
    <tr onclick="toggleRow('${order.id}')" class="${expandedId===order.id?'expanded':''}">
      <td><div class="order-num">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          ${expandedId===order.id ? '<polyline points="18 15 12 9 6 15"/>' : '<polyline points="6 9 12 15 18 9"/>'}
        </svg>#${order.orderNumber||'-'}
      </div></td>
      <td><b>${order.client||'-'}</b></td>
      <td style="color:var(--text-2)">${order.date||''}</td>
      <td><span class="badge ${badgeClass(order.status)}"><span class="badge-dot"></span>${order.status||'בעבודה'}</span></td>
      <td style="text-align:left" class="total-cell">₪${fmt(order.totalAmount)}</td>
      <td><button class="del-btn" onclick="deleteOrder(event,'${order.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button></td>
    </tr>
    ${expandedId===order.id ? `<tr class="expanded-row"><td colspan="6"><div class="expanded-inner">
      <div class="sub-table-wrap"><table class="sub-table">
        <thead><tr><th>פירוט</th><th>כמות</th><th>מחיר יח'</th><th>סטטוס</th><th style="text-align:left">סה"כ</th></tr></thead>
        <tbody>${(order.items||[]).map((item,i)=>`
          <tr>
            <td>${item.description}</td>
            <td>${item.quantity}</td>
            <td>₪${fmt(item.unitPrice)}</td>
            <td>
              <select class="status-select" onchange="updateItemStatus('${order.id}',${i},this.value)" onclick="event.stopPropagation()">
                ${STATUS.map(s=>`<option${item.status===s?' selected':''}>${s}</option>`).join('')}
              </select>
            </td>
            <td class="sub-total" style="text-align:left">₪${fmt(item.total)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div></td></tr>` : ''}
  `).join('');
}

function toggleRow(id) {
  expandedId = expandedId === id ? null : id;
  renderTable();
}

function deleteOrder(e, id) {
  e.stopPropagation();
  if (!confirm('למחוק הזמנה לצמיתות?')) return;
  records = records.filter(r=>r.id!==id);
  if (expandedId===id) expandedId=null;
  save(); renderTable(); renderDashboard();
}

function updateItemStatus(orderId, itemIdx, newStatus) {
  const order = records.find(r=>r.id===orderId);
  if (!order) return;
  order.items[itemIdx].status = newStatus;
  const all = order.items.every(i=>i.status==='הושלם');
  const any = order.items.some(i=>i.status!=='בעבודה');
  order.status = all ? 'הושלם' : any ? 'טופל חלקית' : 'בעבודה';
  save(); renderTable(); renderDashboard();
}

// ── Dashboard ──
function renderDashboard() {
  const total = records.length;
  const inWork = records.filter(r=>r.status==='בעבודה').length;
  const partial = records.filter(r=>r.status==='טופל חלקית').length;
  const done = records.filter(r=>r.status==='הושלם').length;
  const revenue = records.reduce((s,r)=>s+Number(r.totalAmount||0),0);

  // Gauges
  const gauges = [
    { val: inWork, total, label: 'הזמנות בעבודה', color: '#1a73e8' },
    { val: partial, total, label: 'טופלו חלקית', color: '#fbbc04' },
    { val: done, total, label: 'הושלמו', color: '#34a853' },
  ];
  $('gaugesGrid').innerHTML = gauges.map(g => {
    const pct = total ? g.val/total : 0;
    const r=50, cx=55, cy=55;
    const angle = Math.PI * pct;
    const ex = cx - r * Math.cos(angle);
    const ey = cy - r * Math.sin(angle);
    const large = pct > 0.5 ? 1 : 0;
    const arc = pct > 0 ? `M ${cx-r} ${cy} A ${r} ${r} 0 ${large} 1 ${ex.toFixed(2)} ${ey.toFixed(2)}` : '';
    return `<div class="gauge-card">
      <svg class="gauge-svg" viewBox="0 5 110 60">
        <path d="M 5 ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#f1f3f4" stroke-width="10" stroke-linecap="round"/>
        ${arc ? `<path d="${arc}" fill="none" stroke="${g.color}" stroke-width="10" stroke-linecap="round"/>` : ''}
      </svg>
      <div class="gauge-val" style="color:${g.color}">${g.val}</div>
      <div class="gauge-label">${g.label}</div>
    </div>`;
  }).join('') + `<div class="gauge-card revenue-card" style="align-items:flex-start">
    <p class="label">מחזור הכנסות</p>
    <div class="amount">₪${fmt(revenue)}</div>
    <div class="revenue-badge">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      ${total} הזמנות
    </div>
  </div>`;

  // Bar chart by vendor
  const vendorMap = {};
  records.forEach(r => { vendorMap[r.vendor||'אחר'] = (vendorMap[r.vendor||'אחר']||0) + Number(r.totalAmount||0); });
  const vendors = Object.entries(vendorMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxV = vendors.length ? Math.max(...vendors.map(v=>v[1])) : 1;
  $('vendorChart').innerHTML = vendors.length ? vendors.map(([name, val]) => {
    const h = Math.round((val/maxV)*180);
    return `<div class="bar-col">
      <div class="bar-fill" style="height:${h}px" title="${name}: ₪${fmt(val)}"></div>
      <div class="bar-label">${name}</div>
    </div>`;
  }).join('') : '<div style="color:var(--text-3);font-size:13px;margin:auto">אין נתונים</div>';

  // Line chart
  const pts = records.slice(0,20).reverse();
  const svg = $('lineChart');
  if (pts.length < 2) { svg.innerHTML = '<text x="300" y="110" text-anchor="middle" fill="#9aa0a6" font-family="Rubik" font-size="13">אין מספיק נתונים</text>'; return; }
  const maxY = Math.max(...pts.map(p=>Number(p.totalAmount||0)));
  const W=600, H=220, PAD=20;
  const xStep = (W-PAD*2)/(pts.length-1);
  const yScale = v => H - PAD - ((maxY>0?v/maxY:0) * (H-PAD*2));
  const pathD = pts.map((p,i)=>`${i===0?'M':'L'} ${PAD+i*xStep} ${yScale(Number(p.totalAmount||0))}`).join(' ');
  const areaD = `${pathD} L ${PAD+(pts.length-1)*xStep} ${H-PAD} L ${PAD} ${H-PAD} Z`;
  svg.innerHTML = `
    <defs>
      <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#34a853" stop-opacity=".18"/>
        <stop offset="100%" stop-color="#34a853" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#lg)"/>
    <path d="${pathD}" fill="none" stroke="#34a853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${PAD+i*xStep}" cy="${yScale(Number(p.totalAmount||0))}" r="4" fill="#34a853"/>`).join('')}`;
}

// ── CSV Export ──
function exportCSV() {
  if (!records.length) { showToast('אין נתונים לייצוא'); return; }
  const headers = ['Order_ID','Order_Number','Date','Client','Vendor','Item','Qty','Price','Total','Item_Status','Order_Status'];
  const rows = [];
  records.forEach(o => (o.items||[]).forEach(it =>
    rows.push([o.id,o.orderNumber,o.date,o.client,o.vendor,it.description,it.quantity,it.unitPrice,it.total,it.status,o.status])
  ));
  let csv = '\uFEFF' + headers.join(',') + '\n';
  rows.forEach(r => { csv += r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',') + '\n'; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = `modiin_orders_${Date.now()}.csv`;
  a.click();
  showToast('CSV יוצא בהצלחה');
}

// ── Init ──
renderDashboard();
</script>
</body>
</html>
