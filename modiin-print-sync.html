<!doctype html><html lang='he' dir='rtl'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><meta http-equiv='Cache-Control' content='no-cache,no-store,must-revalidate'><title>דפוס מודיעין - מעקב הזמנות</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap' rel='stylesheet'><style>*{box-sizing:border-box}body{margin:0;font-family:Rubik,Arial,sans-serif;background:#f6f8fb;color:#202124;display:flex;min-height:100vh;overflow:hidden}aside{width:250px;background:#fff;border-left:1px solid #e8eaed;padding:22px 14px;box-shadow:-2px 0 10px #0000000d}.logo{display:flex;gap:12px;align-items:center;padding:8px 10px 26px}.logo b{font-size:18px}.logo small{color:#8a9099}.icon{width:44px;height:44px;border-radius:12px;background:#1a73e8;color:#fff;display:grid;place-items:center;font-size:24px}.nav{width:100%;border:0;background:transparent;padding:13px 16px;border-radius:999px;text-align:right;font:700 14px Rubik;color:#5f6368;cursor:pointer;margin:4px 0}.nav.active,.nav:hover{background:#e8f0fe;color:#1a73e8}.sep{height:1px;background:#e8eaed;margin:14px 0}main{flex:1;min-width:0;display:flex;flex-direction:column}header{height:68px;background:#ffffffee;border-bottom:1px solid #e8eaed;display:flex;gap:14px;align-items:center;padding:0 26px}.upload{display:flex;gap:10px;align-items:center;padding:9px 12px;background:#fff;border:1px solid #e8eaed;border-radius:12px;box-shadow:0 1px 4px #00000012}.upload span{font-weight:800;color:#5f6368;font-size:13px}.upload input{font:500 12px Rubik;max-width:230px}.upload input::file-selector-button{border:0;border-radius:9px;background:#1a73e8;color:white;padding:9px 13px;margin-left:10px;font:800 12px Rubik;cursor:pointer}.status{background:#e6f4ea;border:1px solid #c8e6d1;color:#2b6c39;border-radius:999px;padding:8px 13px;font-size:12px;font-weight:800}.search{margin-inline-start:auto;max-width:390px;flex:1}.search input{width:100%;border:0;background:#f1f3f4;border-radius:999px;padding:12px 18px;font:500 13px Rubik}#content{overflow:auto;padding:28px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;margin-bottom:22px}.card{background:#fff;border:1px solid #e8eaed;border-radius:16px;padding:22px;box-shadow:0 1px 4px #0000000d}.num{font-size:32px;font-weight:800;color:#1a73e8;margin-top:8px}.muted{color:#8a9099;font-size:12px;font-weight:800}.drop{border:2px dashed #c7d7f5;background:#f5f8ff;border-radius:16px;padding:24px;display:flex;justify-content:space-between;gap:16px;margin-bottom:18px;cursor:pointer}.drop b{font-size:17px}.drop p{margin:5px 0 0;color:#5f6368;font-size:13px}.pill{background:#fff;border:1px solid #d6e2fb;color:#1a73e8;border-radius:999px;padding:10px 15px;font-weight:800;font-size:12px;align-self:center}table{width:100%;border-collapse:collapse;min-width:720px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px #0000000d}th{background:#f8f9fa;color:#8a9099;font-size:11px;text-align:right;padding:14px;border-bottom:1px solid #e8eaed}td{padding:15px 14px;border-bottom:1px solid #eef0f3;font-size:13px}tr:hover{background:#f4f8ff}.order{color:#1a73e8;font-weight:800}.badge{display:inline-block;background:#e8f0fe;color:#1a73e8;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:800}.btn{border:0;border-radius:999px;background:#1a73e8;color:white;padding:13px 26px;font:800 14px Rubik;cursor:pointer}.btn.secondary{background:#fff;color:#1a73e8;border:1px solid #d6e2fb}.btn.danger{background:#ea4335}.settings{max-width:560px}.row{display:flex;gap:8px}.row input,.field input,.item input{width:100%;border:1px solid #e8eaed;border-radius:10px;padding:10px;font:500 13px Rubik}.hint{font-size:12px;color:#8a9099;margin-top:8px;line-height:1.5}.modalbg{position:fixed;inset:0;background:#20212488;display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal{background:#fff;border-radius:22px;width:min(1120px,100%);max-height:92vh;overflow:auto;padding:26px;box-shadow:0 18px 55px #0000002b}.modal h2{margin:0 0 18px}.review{display:grid;grid-template-columns:1fr 1fr;gap:18px}.preview iframe{width:100%;height:560px;border:1px solid #e8eaed;border-radius:14px;background:#fff}.fields{background:#f8f9fa;border-radius:16px;padding:18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}.field label{display:block;font-size:11px;color:#8a9099;font-weight:800;margin-bottom:5px}.items{display:flex;flex-direction:column;gap:8px;max-height:310px;overflow:auto}.item{display:grid;grid-template-columns:minmax(160px,1fr) 72px 92px 92px;gap:8px;background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:10px}.total{font-size:28px;font-weight:800;margin-top:16px}.toast{position:fixed;top:82px;left:50%;transform:translateX(-50%);background:#202124;color:#fff;border-radius:999px;padding:12px 24px;font-weight:700;font-size:13px;display:none;z-index:50}.toast.warn{background:#b45309}.toast.err{background:#c0392b}@media(max-width:760px){body{display:block;overflow:auto}aside{width:auto}.review{grid-template-columns:1fr}.grid{grid-template-columns:1fr}header{height:auto;flex-wrap:wrap;padding:14px}.search{min-width:100%;order:3}.item{grid-template-columns:1fr 70px}#content{padding:16px}}</style></head><body><aside><div class='logo'><div class='icon'>🖨</div><div><b>דפוס מודיעין</b><br><small>מעקב הזמנות</small></div></div><button class='nav active' data-tab='dash' onclick='tab("dash")'>דשבורד</button><button class='nav' data-tab='orders' onclick='tab("orders")'>ניהול הזמנות</button><div class='sep'></div><button class='nav' onclick='csv()'>ייצוא CSV</button><button class='nav' data-tab='settings' onclick='tab("settings")'>הגדרות</button></aside><main><header><label class='upload'><span id='uploadText'>העלה PDF</span><input id='fileInput' type='file' accept='application/pdf' onchange='handleFile(event)'></label><span class='status' id='appStatus'>מוכן</span><div class='search'><input id='q' placeholder='חיפוש לקוח או מספר הזמנה...' oninput='renderTable()'></div></header><div id='content'><section id='tab-dash'><div class='cards' id='cards'></div></section><section id='tab-orders' style='display:none'><div class='drop' onclick='openPicker()'><div><b>העלאת PDF להזמנה</b><p>האפליקציה סורקת בענן ופותחת טופס בדיקה לפני שמירה.</p></div><div class='pill'>בחר קובץ</div></div><div style='overflow:auto'><table><thead><tr><th>מספר</th><th>לקוח</th><th>תאריך</th><th>סטטוס</th><th style='text-align:left'>סהכ</th><th></th></tr></thead><tbody id='tbody'></tbody></table></div></section><section id='tab-settings' style='display:none'><div class='card settings'><h2>הגדרות</h2><label>OCR.space API Key</label><div class='row'><input id='ocrKey' type='password' placeholder='השאר ריק ל-helloworld'><button class='btn' onclick='saveKey()'>שמור</button></div><p class='hint'>מפתח הדמו עובד לבדיקה. לשימוש יציב יותר פתח מפתח חינמי ב-OCR.space והדבק כאן.</p><div class='sep'></div><button class='btn danger' onclick='clearData()'>מחק את כל ההזמנות</button></div></section></div></main><div class='modalbg' id='modal' onclick='if(event.target.id==="modal")closeModal()'><div class='modal'><h2>אישור נתוני סריקה</h2><div class='review'><div class='preview'><iframe id='pdf'></iframe></div><div class='fields'><div class='grid'><div class='field'><label>לקוח</label><input id='client'></div><div class='field'><label>הזמנה</label><input id='orderNo'></div><div class='field'><label>תאריך</label><input id='date' type='date'></div><div class='field'><label>סהכ</label><input id='docTotal' type='number' step='0.01' oninput='recalc()'></div></div><div class='items' id='items'></div><button class='btn secondary' onclick='addItem()'>הוסף שורה</button><div class='total' id='total'></div><br><button class='btn' onclick='saveOrder()'>אישור ושמירה</button> <button class='btn secondary' onclick='closeModal()'>סגור</button></div></div></div></div><div class='toast' id='toast'></div><script>const $=id=>document.getElementById(id);let records=load(),pending=null,expanded=null;function load(){try{return JSON.parse(localStorage.getItem('modiin_orders')||'[]')}catch{return[]}}function persist(){localStorage.setItem('modiin_orders',JSON.stringify(records))}function toast(t,c=''){let x=$('toast');x.textContent=t;x.className='toast '+c;x.style.display='block';setTimeout(()=>x.style.display='none',3500)}function fmt(n){return Number(n||0).toLocaleString('he-IL')}function tab(t){['dash','orders','settings'].forEach(x=>{$('tab-'+x).style.display=x==t?'block':'none';document.querySelector('[data-tab='+x+']')?.classList.toggle('active',x==t)});if(t=='dash')dash();if(t=='orders')renderTable();if(t=='settings')$('ocrKey').value=localStorage.getItem('ocr_space_key')||''}function saveKey(){localStorage.setItem('ocr_space_key',$('ocrKey').value.trim());toast('מפתח OCR נשמר')}function clearData(){if(confirm('למחוק את כל ההזמנות?')){records=[];persist();dash();renderTable();toast('נמחק')}}function openPicker(){$('fileInput').click()}async function handleFile(e){let f=e.target.files[0];e.target.value='';if(!f)return;if(f.type!='application/pdf'){toast('נתמך PDF בלבד','warn');return}setBusy(1);try{let data=await scan(f);data.sourceFile=f.name;data.previewFile=f;pending=data;openModal(data);toast('הסריקה הושלמה - בדוק ואשר')}catch(err){toast('סריקה נכשלה: '+err.message,'err')}finally{setBusy(0)}}function setBusy(on){$('fileInput').disabled=!!on;$('uploadText').textContent=on?'סורק...':'העלה PDF';$('appStatus').textContent=on?'סורק בענן':'מוכן'}function fileDataUrl(f){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(Error('קריאת קובץ נכשלה'));r.readAsDataURL(f)})}async function scan(f){let fd=new FormData();fd.append('base64Image',await fileDataUrl(f));fd.append('language','auto');fd.append('OCREngine','3');fd.append('isTable','true');fd.append('scale','true');fd.append('detectOrientation','true');fd.append('isOverlayRequired','false');fd.append('filetype','PDF');let key=(localStorage.getItem('ocr_space_key')||'').trim()||'helloworld';let r=await fetch('https://api.ocr.space/parse/image',{method:'POST',headers:{apikey:key},body:fd});if(!r.ok)throw Error('שגיאת OCR '+r.status);let j=await r.json();if(j.IsErroredOnProcessing)throw Error([j.ErrorMessage,j.ErrorDetails].flat().filter(Boolean).join(' ')||'שגיאת OCR');let text=(j.ParsedResults||[]).map(x=>x.ParsedText||'').join('\n').trim();if(!text)throw Error('לא התקבל טקסט');return parseText(text,f.name)}function linesOf(t){return t.replaceAll('\r','').split('\n').map(x=>x.replace(/\s+/g,' ').trim()).filter(Boolean)}function amount(s){let m=String(s||'').match(/-?\d{1,3}(?:,\d{3})*(?:\.\d+)?|-?\d+(?:\.\d+)?/g);return m?Number(m[m.length-1].replaceAll(',','')):0}function parseText(text,name){let lines=linesOf(text),joined=lines.join(' '),order=(joined.match(/הצעת\s*מחיר\s*\/?\s*הזמנה\s*[-–:]?\s*(\d{5,})/)||joined.match(/(?:הזמנה|מחיר)\D{0,20}(\d{5,})/)||name.match(/(\d{5,})/)||[])[1]||name.replace(/\.[^.]+$/,'');let dateRaw=(joined.match(/\b(\d{1,2}[.\/-]\d{1,2}[.\/-]\d{2,4})\b/)||[])[1]||'',date='';if(dateRaw){let p=dateRaw.replaceAll('.','/').replaceAll('-','/').split('/');date=(p[2].length==2?'20'+p[2]:p[2])+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0')}let client='';for(let i=0;i<lines.length;i++)if(lines[i].includes('לכבוד')){client=clean(lines[i].split(':').slice(1).join(':'));if(!client){for(let j=i+1;j<i+5&&j<lines.length;j++){if(lines[j].includes('כתובת'))break;let c=clean(lines[j]);if(c&&!badClient(c)){client=c;break}}}break}let items=parseItems(lines),docTotal=parseTotal(lines,items);if(!items.length&&docTotal)items=[{description:'סהכ הזמנה',quantity:1,unitPrice:docTotal,total:docTotal,status:'בעבודה'}];return{vendor:'דפוס מודיעין',orderNumber:order,client,date,documentTotal:docTotal,items:items.length?items:[{description:'',quantity:1,unitPrice:0,total:0,status:'בעבודה'}]}}function clean(v){return String(v||'').replace(/[|()[\]{}]/g,' ').replace(/^[\s:;,.\-]+|[\s:;,.\-]+$/g,'').replace(/\s+/g,' ').trim()}function badClient(v){return /כתובת|טל|פקס|ע\.?\s*מ|ח\.?\s*פ|תאריך|הצעת|מחיר|הזמנה|www|@|דפוס|מודיעין/.test(v)}function parseItems(lines){let start=lines.findIndex(x=>/^תאור$|^תיאור$/.test(x));if(start<0)return[];let desc=[];for(let i=start+1;i<lines.length;i++){let l=lines[i];if(/סה.?כ\s+הצעת\s+מחיר|^כמות$|^מחיר\s+ב|^סה.?כ\s+ב|סיכום|ביניים/.test(l))break;if(/הצעת\s+מחיר|הזמנה\s*[-–:]?\s*\d|כתובת|לכבוד|טל|פקס|www|@|ח\.?\s*פ|ע\.?\s*מ/.test(l))continue;if(/^\d[\d,.\s%-]*$/.test(l))continue;if(/[א-תA-Za-z]/.test(l))desc.push(clean(l))}let d=[];for(let l of desc){let p=d[d.length-1]||'';if(p&&(/^\d/.test(l)&&(p.length>35||/[+/,]$/.test(p))||/[+/,]$/.test(p)||p.length>55&&l.length<45))d[d.length-1]=(p+' '+l).trim();else d.push(l)}let starts=[lines.findIndex(x=>/סה.?כ\s+ב/.test(x)),lines.findIndex(x=>/מחיר\s+ב/.test(x)),lines.findIndex(x=>/^כמות$/.test(x))].filter(x=>x>=0);let s=starts.length?Math.max(...starts):-1;if(!d.length||s<0)return[];let nums=[];for(let i=s+1;i<lines.length;i++){let l=lines[i];if(/סיכום|ביניים|הנחה|עיגול|לפני|מע.?מ|בברכה/.test(l))break;if(/ח\.?פ|ע\.?מ|טל|פקס|www|@/.test(l))continue;if(!/^-?\d/.test(l))continue;let m=l.match(/-?\d{1,3}(?:,\d{3})*(?:\.\d+)?|-?\d+(?:\.\d+)?/g)||[];m.forEach(x=>nums.push(Number(x.replaceAll(',',''))))}if(nums.length<d.length*3)return[];let n=d.length,row=d.map((x,i)=>item(x,nums[i*3+2],nums[i*3+1],nums[i*3])),col=d.map((x,i)=>item(x,nums[i+n*2],nums[i+n],nums[i]));return score(col)>=score(row)?col:row}function item(description,quantity,unitPrice,total){return{description,quantity,unitPrice,total,status:'בעבודה'}}function score(a){return a.reduce((s,i)=>{let q=+i.quantity,p=+i.unitPrice,t=+i.total;if(!isFinite(q)||!isFinite(p)||!isFinite(t))return s-20;let diff=Math.abs(q*p-t),tol=Math.max(.05,Math.abs(t)*.03);return s+(diff<=tol?20:-Math.min(20,diff/10))},0)}function parseTotal(lines,items){for(let i=0;i<lines.length;i++){if(!/מע.?מ/.test(lines[i])||/לפני/.test(lines[i]))continue;for(let j=i+1;j<Math.min(lines.length,i+4);j++){let v=amount(lines[j]);if(v)return v}}return items.reduce((s,i)=>s+Number(i.total||0),0)}function openModal(d){$('client').value=d.client||'';$('orderNo').value=d.orderNumber||'';$('date').value=d.date||'';$('docTotal').value=Number(d.documentTotal||0);$('items').innerHTML=(d.items||[]).map(rowHtml).join('');recalc();$('modal').style.display='flex';let p=$('pdf');if(d.previewFile){if(p.dataset.url)URL.revokeObjectURL(p.dataset.url);p.dataset.url=URL.createObjectURL(d.previewFile);p.src=p.dataset.url}}function rowHtml(i){return `<div class='item' data-item><input class='desc' value='${esc(i.description||'')}' placeholder='תיאור'><input class='qty' type='number' step='1' value='${Number(i.quantity||1)}' oninput='recalc()'><input class='price' type='number' step='0.01' value='${Number(i.unitPrice||0)}' oninput='recalc()'><input class='sum' type='number' step='0.01' value='${Number(i.total||0)}' oninput='recalc()'></div>`}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll("'",'&#39;')}function addItem(){$('items').insertAdjacentHTML('beforeend',rowHtml({description:'',quantity:1,unitPrice:0,total:0}));recalc()}function recalc(){let explicit=Number($('docTotal').value||0),sum=0;document.querySelectorAll('[data-item]').forEach(r=>{let q=Number(r.querySelector('.qty').value||0),p=Number(r.querySelector('.price').value||0),t=Number(r.querySelector('.sum').value||0)||q*p;sum+=t});$('total').textContent='סהכ: ₪'+fmt(explicit||sum)}function collect(){let items=[...document.querySelectorAll('[data-item]')].map(r=>{let q=Number(r.querySelector('.qty').value||0),p=Number(r.querySelector('.price').value||0),t=Number(r.querySelector('.sum').value||0)||q*p;return{description:r.querySelector('.desc').value.trim()||'פריט',quantity:q||1,unitPrice:p,total:t,status:'בעבודה'}});return{...pending,client:$('client').value.trim()||'-',orderNumber:$('orderNo').value.trim()||String(Date.now()),date:$('date').value,documentTotal:Number($('docTotal').value||0),items}}function saveOrder(){if(!pending)return;let d=collect(),sum=d.documentTotal||d.items.reduce((s,i)=>s+Number(i.total||0),0);records.unshift({...d,id:Math.random().toString(36).slice(2,10),totalAmount:sum,status:'בעבודה',createdAt:new Date().toISOString()});persist();closeModal();tab('orders');toast('ההזמנה נשמרה')}function closeModal(){$('modal').style.display='none';pending=null}function renderTable(){let q=($('q').value||'').toLowerCase();let list=records.filter(r=>(r.client||'').toLowerCase().includes(q)||String(r.orderNumber||'').includes(q));$('tbody').innerHTML=list.map(r=>`<tr><td class='order'>#${esc(r.orderNumber||'-')}</td><td><b>${esc(r.client||'-')}</b></td><td>${esc(r.date||'')}</td><td><span class='badge'>${esc(r.status||'בעבודה')}</span></td><td style='text-align:left'>₪${fmt(r.totalAmount)}</td><td><button class='btn secondary' onclick='delOrder("${r.id}")'>מחק</button></td></tr><tr><td colspan='6'>${(r.items||[]).map(i=>`<div>${esc(i.description)} | כמות ${i.quantity} | ₪${fmt(i.total)}</div>`).join('')}</td></tr>`).join('')}function delOrder(id){if(confirm('למחוק הזמנה?')){records=records.filter(r=>r.id!=id);persist();renderTable();dash()}}function dash(){let work=records.filter(r=>r.status=='בעבודה').length,done=records.filter(r=>r.status=='הושלם').length,total=records.reduce((s,r)=>s+Number(r.totalAmount||0),0);$('cards').innerHTML=`<div class='card'><div class='muted'>הזמנות</div><div class='num'>${records.length}</div></div><div class='card'><div class='muted'>בעבודה</div><div class='num'>${work}</div></div><div class='card'><div class='muted'>הושלמו</div><div class='num'>${done}</div></div><div class='card'><div class='muted'>מחזור</div><div class='num'>₪${fmt(total)}</div></div>`}function csv(){if(!records.length){toast('אין נתונים','warn');return}let rows=['Order;Number;Date;Client;Item;Qty;Unit;Total'];records.forEach(o=>(o.items||[]).forEach(i=>rows.push([o.id,o.orderNumber,o.date,o.client,i.description,i.quantity,i.unitPrice,i.total].join(';'))));let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+rows.join('\n')],{type:'text/csv;charset=utf-8'}));a.download='modiin_orders.csv';a.click()}dash();</script></body></html>
