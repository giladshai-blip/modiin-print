x!important;background:linear-gradient(135deg,#fff,#eef5ff)!important}.status-list{gap:10px!important}.status-row{grid-template-columns:112px 1fr 58px!important;padding:11px 12px!important;border-radius:13px!important;border:1px solid var(--row-border,#e3e8f0)!important;background:var(--row-bg,#fff)!important}.status-row:nth-child(1){--row-bg:#f7f9fc;--row-border:#e2e7ef}.status-row:nth-child(2){--row-bg:#edf4ff;--row-border:#c9dcff}.status-row:nth-child(3){--row-bg:#ecf8ef;--row-border:#bfe6c9}.status-row:nth-child(4){--row-bg:#fff0ef;--row-border:#f5c2bd}.status-row:nth-child(5){--row-bg:#f5f6f8;--row-border:#dfe3e8}.status-track,.hbar-track{height:13px!important;box-shadow:inset 0 0 0 1px rgba(60,64,67,.06)!important}@media(min-width:769px){.menu-btn{display:flex!important;background:#fff!important;border:1px solid #d6e2fb!important;box-shadow:0 8px 18px rgba(60,64,67,.1)!important;color:#1a73e8!important}body.sidebar-collapsed #sidebar{width:0!important;padding-right:0!important;padding-left:0!important;border-left:0!important;box-shadow:none!important;opacity:0!important;pointer-events:none!important;overflow:hidden!important}body.sidebar-collapsed #main{flex-basis:100%!important}.sidebar-overlay.visible{display:none!important}}@media(max-width:1100px){.gauge-dashboard{grid-template-columns:repeat(3,minmax(150px,1fr))!important}.dashboard-grid,.dashboard-side{grid-template-columns:1fr!important}}@media(max-width:768px){.dashboard-header{align-items:stretch!important}.gauge-dashboard{grid-template-columns:repeat(2,1fr)!important}.dashboard-grid,.dashboard-side{grid-template-columns:1fr!important}}@media(max-width:520px){.gauge-dashboard{grid-template-columns:1fr!important}}`;html=html.replace('</head>',`<style id="demo-1-1-dashboard">${demoCss}</style></head>`);document.open();document.write(html);document.close();setTimeout(()=>{const sc=document.createElement('script');sc.id='demo-1-1-sidebar';sc.textContent="(function(){const desktop=window.matchMedia('(min-width: 769px)');const btn=()=>document.querySelector('.menu-btn');const label=collapsed=>{const b=btn();if(!b)return;b.title=collapsed?'הצג סרגל צד':'הסתר סרגל צד';b.setAttribute('aria-label',b.title)};const setCollapsed=on=>{document.body.classList.toggle('sidebar-collapsed',on);try{localStorage.setItem('modiin_demo11_sidebar_collapsed',on?'1':'0')}catch(e){}label(on)};const mobileToggle=()=>{const s=document.getElementById('sidebar'),o=document.getElementById('sidebarOverlay');if(!s||!o)return;s.classList.contains('open')?(s.classList.remove('open'),o.classList.remove('visible')):(s.classList.add('open'),o.classList.add('visible'))};const handle=e=>{e.preventDefault();e.stopImmediatePropagation();desktop.matches?setCollapsed(!document.body.classList.contains('sidebar-collapsed')):mobileToggle()};window.toggleSidebar=()=>desktop.matches?setCollapsed(!document.body.classList.contains('sidebar-collapsed')):mobileToggle();window.openSidebar=()=>desktop.matches?setCollapsed(false):(document.getElementById('sidebar')?.classList.add('open'),document.getElementById('sidebarOverlay')?.classList.add('visible'));window.closeSidebar=()=>desktop.matches?setCollapsed(true):(document.getElementById('sidebar')?.classList.remove('open'),document.getElementById('sidebarOverlay')?.classList.remove('visible'));const b=btn();if(b){b.onclick=null;b.addEventListener('click',handle,true)}let saved=false;try{saved=localStorage.getItem('modiin_demo11_sidebar_collapsed')==='1'}catch(e){}if(desktop.matches&&saved)setCollapsed(true);else label(false);desktop.addEventListener?.('change',()=>{document.getElementById('sidebar')?.classList.remove('open');document.getElementById('sidebarOverlay')?.classList.remove('visible');label(document.body.classList.contains('sidebar-collapsed'))});document.body.dataset.demoSidebar='ready'})();";document.body.appendChild(sc)},120)}catch(e){document.body.innerHTML='<div class="box err"><h2>שגיאה בטעינת האפליקציה</h2><p>'+String(e.message||e)+'</p></div>'}})();
