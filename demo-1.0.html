<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>דפוס מודיעין - מעקב הזמנות</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,sans-serif;background:#f6f8fb;color:#202124}.box{text-align:center;padding:28px}.spinner{width:42px;height:42px;border:4px solid #d7e3ff;border-top-color:#1a73e8;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 14px}@keyframes s{to{transform:rotate(360deg)}}.err{max-width:560px;line-height:1.6}</style></head><body><div class="box"><div class="spinner"></div><b>טוען את דפוס מודיעין...</b></div><script>
(async()=>{try{if(!('DecompressionStream'in window))throw new Error('הדפדפן לא תומך בטעינת הגרסה המלאה. נסה Chrome או Edge עדכני.');const decodeBase64=s=>{s=String(s).replace(/[^A-Za-z0-9+/=]/g,'');const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';let out=[],buf=0,bits=0;for(const ch of s){if(ch==='=')break;const val=chars.indexOf(ch);if(val<0)continue;buf=(buf<<6)|val;bits+=6;if(bits>=8){bits-=8;out.push((buf>>bits)&255)}}return new Uint8Array(out)};const v='1780068725000';const files=['0','1','2a','2b','2c','3'].map(i=>'modiin-print-sync.v2.'+i+'.txt?v='+v);const data=(await Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('טעינת קובץ נתונים נכשלה');return r.text()})))).join('');const bin=decodeBase64(data);const stream=new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()}catch(e){document.body.innerHTML='<div class="box err"><h2>שגיאה בטעינת האפליקציה</h2><p>'+String(e.message||e)+'</p></div>'}})();
</script></body></html>
